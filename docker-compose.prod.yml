services:

  backend:
    image: liax-backend:latest
    container_name: liax-backend-dashboard
    ports:
      - "4001:8000"
    env_file:
      - .env.prod
    restart: unless-stopped

  frontend:
    image: liax-frontend:latest
    container_name: liax-frontend-dashboard
    ports:
      - "5001:80"
    depends_on:
      - backend
    restart: unless-stopped

  dashboard-legacy:
    image: liax-legacy:latest
    container_name: clickup-dashboard-legacy
    ports:
      - "5002:5000"
    env_file:
      - .env.prod
    environment:
      ENABLE_AUTO_RELOAD: "false"
    volumes:
      - ./old/app.py:/app/app.py
      - ./old/templates:/app/templates
      - ./projects.json:/app/projects.json
      - ./cache:/app/cache
    restart: unless-stopped
