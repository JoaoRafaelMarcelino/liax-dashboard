<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro - Dashboard ClickUp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-md w-full mx-4">
        <div class="text-center">
            <div class="bg-red-100 rounded-full w-20 h-20 flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-red-500 text-4xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800 mb-4">Ops! Algo deu errado</h1>
            <p class="text-gray-600 mb-6">
                Ocorreu um erro ao carregar o dashboard. Por favor, tente novamente.
            </p>
            {% if error %}
            <div class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6 text-left">
                <p class="text-sm text-red-700 font-mono break-all">{{ error }}</p>
            </div>
            {% endif %}
            <button onclick="location.reload()" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-semibold hover:bg-purple-700 transition">
                <i class="fas fa-redo mr-2"></i>Tentar Novamente
            </button>
        </div>
    </div>
</body>
</html>
