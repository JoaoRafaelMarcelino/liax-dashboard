version: '3.8'

services:
  dashboard:
    build: .
    container_name: clickup-dashboard
    ports:
      - "5001:5000"
    environment:
      - CLICKUP_TOKEN=${CLICKUP_TOKEN:-pk_78841674_UDO4MG6XRKSWRWLKJW0TMTHOO4B0A4K7}
      - ENABLE_AUTO_RELOAD=false
    volumes:
      - ./app.py:/app/app.py
      - ./templates:/app/templates
      - ./projects.json:/app/projects.json
      - ./cache:/app/cache
    restart: unless-stopped
